<main class="contenedor">

    <!-- Producto 1 -->
    <div class="producto">
        <img src="images/bustoNaruto.jpg" alt="Naruto">
        <h2>Busto Naruto</h2>
        
        <label>Stock:</label>
        
        <span data-stock-producto="Busto Naruto"></span>
        
        <p>$12000</p>
        
        <label>Cantidad:</label>
        <input type="number" id="cantidadNaruto" min="1" max="5" value="1">


        <button onclick="agregarCarrito('Busto Naruto',12000,'cantidadNaruto')">
            Agregar al carrito
        </button>
    </div>

    <!-- Producto 2 -->
    <div class="producto">
        <img src="images/FiguraGoku.jpg" alt="Goku">
        <h2>Figura Goku</h2>
        <label>Stock:</label>

        <span data-stock-producto="Figura Goku"></span>
        <p>$15000</p>
        

        <label>Cantidad:</label>
        <input type="number" id="cantidadGoku" min="1" max="10" value="1">

        <button onclick="agregarCarrito('Figura Goku',15000,'cantidadGoku')">
            Agregar al carrito
        </button>
    </div>

</main>
